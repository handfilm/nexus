<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS OS // Enterprise Audit ERP</title>
<!--
  NEXUS OS — Phase 1 framework
  Decoupled Vanilla JS ES6+ · zero framework · zero external deps
  Deploy target: handfilm.github.io/nexus/
  Section map (Phase 2 split points marked ▼):
    ▼ CSS         → css/nexus.css
    ▼ NexusBus    → js/core/bus.js
    ▼ NexusStore  → js/core/store.js   (+ seed → js/core/seed.js)
    ▼ Router      → js/core/router.js
    ▼ Modules     → js/modules/*.js
-->
<style>
/* ============================================================ ▼ CSS / nexus.css ===== */
:root{
  --bg:#0a0a0a; --panel:#101010; --panel-2:#141414; --raise:#181818;
  --line:#242424; --line-soft:#1b1b1b;
  --gold:#d4af37; --gold-dim:rgba(212,175,55,.14); --gold-edge:rgba(212,175,55,.4);
  --txt:#e9e9e9; --muted:#7a7a7a; --muted-2:#555;
  --ok:#5fb87a; --ok-dim:rgba(95,184,122,.12);
  --bad:#e0533d; --bad-dim:rgba(224,83,61,.12);
  --warn:#d4af37;
  --mono:ui-monospace,SFMono-Regular,"JetBrains Mono",Menlo,Consolas,monospace;
  --nav-w:236px; --flyout-w:440px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--txt);font-family:var(--mono);
  font-size:13px;line-height:1.5;letter-spacing:.2px;
  -webkit-font-smoothing:antialiased;
  display:grid;grid-template-columns:var(--nav-w) 1fr;
}
::selection{background:var(--gold);color:#000}
a{color:inherit;text-decoration:none}
button{font-family:var(--mono);cursor:pointer}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ---- scrollbars ---- */
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#1f1f1f;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#2c2c2c}

/* ============================== SIDEBAR ============================== */
.nav{
  background:var(--panel);border-right:1px solid var(--line);
  height:100vh;position:sticky;top:0;display:flex;flex-direction:column;
}
.nav__brand{
  display:flex;align-items:center;gap:10px;padding:18px 18px 16px;
  border-bottom:1px solid var(--line);
}
.nav__hex{color:var(--gold);font-size:18px;line-height:1}
.nav__brand b{font-size:15px;letter-spacing:3px;font-weight:700}
.nav__brand span{color:var(--muted);font-size:9px;letter-spacing:2px;display:block;margin-top:2px}
.nav__grp{padding:14px 18px 6px;color:var(--muted-2);font-size:9px;letter-spacing:2px;text-transform:uppercase}
.nav__list{list-style:none;flex:1;overflow-y:auto;padding-bottom:18px}
.nav__item{
  display:flex;align-items:center;gap:11px;padding:9px 18px;
  color:var(--muted);border-left:2px solid transparent;
  transition:background .12s,color .12s,border-color .12s;user-select:none;
}
.nav__item:hover{background:var(--panel-2);color:var(--txt)}
.nav__item.is-active{background:var(--gold-dim);color:var(--gold);border-left-color:var(--gold)}
.nav__ico{width:14px;text-align:center;font-size:12px;opacity:.9}
.nav__lbl{font-size:12px;letter-spacing:.6px;flex:1}
.nav__pip{font-size:9px;color:var(--muted-2);letter-spacing:1px}
.nav__item.is-active .nav__pip{color:var(--gold-edge)}
.nav__foot{padding:12px 18px;border-top:1px solid var(--line);color:var(--muted-2);font-size:9px;letter-spacing:1px}

/* ============================== SHELL ============================== */
.shell{height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:18px;
  padding:14px 26px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:rgba(10,10,10,.86);backdrop-filter:blur(6px);z-index:20;
}
.topbar__crumb{font-size:11px;letter-spacing:1.4px;color:var(--muted)}
.topbar__crumb b{color:var(--gold);font-weight:700}
.kpis{display:flex;gap:0}
.kpi{padding:0 16px;border-left:1px solid var(--line);text-align:right}
.kpi:first-child{border-left:0}
.kpi b{display:block;font-size:15px;color:var(--txt);font-weight:700;line-height:1.1}
.kpi.is-bad b{color:var(--bad)} .kpi.is-ok b{color:var(--ok)}
.kpi span{font-size:8.5px;letter-spacing:1.4px;color:var(--muted-2);text-transform:uppercase}
.view{padding:26px;flex:1}

/* ============================== TYPE / HEADERS ============================== */
.mod-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px}
.mod-head h1{font-size:20px;font-weight:700;letter-spacing:1px}
.mod-head h1 i{color:var(--gold);font-style:normal}
.mod-head p{color:var(--muted);font-size:11px;letter-spacing:.4px;margin-top:5px;max-width:62ch}
.eyebrow{color:var(--gold);font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:7px;display:block}

/* ============================== BUTTONS ============================== */
.btn{
  background:transparent;color:var(--txt);border:1px solid var(--line);
  padding:7px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;
  transition:.12s;display:inline-flex;align-items:center;gap:7px;
}
.btn:hover{border-color:var(--gold-edge);color:var(--gold)}
.btn--gold{border-color:var(--gold-edge);color:var(--gold)}
.btn--gold:hover{background:var(--gold);color:#000}
.btn--bad{border-color:rgba(224,83,61,.4);color:var(--bad)}
.btn--bad:hover{background:var(--bad);color:#000}
.btn--xs{padding:4px 9px;font-size:9.5px}

/* ============================== PANELS / GRID ============================== */
.grid{display:grid;gap:1px;background:var(--line);border:1px solid var(--line)}
.grid--3{grid-template-columns:repeat(3,1fr)}
.grid--2{grid-template-columns:repeat(2,1fr)}
.cell{background:var(--panel);padding:16px 18px}
.cell .lab{color:var(--muted-2);font-size:9px;letter-spacing:1.6px;text-transform:uppercase}
.cell .big{font-size:22px;font-weight:700;margin-top:6px}
.cell .sub{color:var(--muted);font-size:10px;margin-top:3px}

.panel{background:var(--panel);border:1px solid var(--line)}
.panel__hd{padding:11px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.panel__hd h3{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.panel__hd h3 i{color:var(--gold);font-style:normal}
.panel__bd{padding:0}

/* ============================== DATA TABLE ============================== */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{
  text-align:left;padding:10px 16px;color:var(--muted-2);font-weight:400;
  font-size:9px;letter-spacing:1.6px;text-transform:uppercase;
  border-bottom:1px solid var(--line);background:var(--panel-2);
}
.tbl th.r,.tbl td.r{text-align:right}
.tbl td{padding:11px 16px;border-bottom:1px solid var(--line-soft)}
.tbl tbody tr{transition:background .1s}
.tbl tbody tr.clickable{cursor:pointer}
.tbl tbody tr.clickable:hover{background:var(--panel-2)}
.tbl tbody tr:hover .id-cell{color:var(--gold)}
.id-cell{color:var(--muted);letter-spacing:.5px}
.tbl .name{color:var(--txt)}
.num{font-variant-numeric:tabular-nums}

/* ---- status pills ---- */
.pill{display:inline-block;padding:2px 8px;font-size:9px;letter-spacing:1px;text-transform:uppercase;border:1px solid}
.pill--ok{color:var(--ok);border-color:rgba(95,184,122,.4);background:var(--ok-dim)}
.pill--bad{color:var(--bad);border-color:rgba(224,83,61,.4);background:var(--bad-dim)}
.pill--gold{color:var(--gold);border-color:var(--gold-edge);background:var(--gold-dim)}
.pill--mute{color:var(--muted);border-color:var(--line);background:transparent}

/* ============================== 8-STEP TRACKER ============================== */
.stepper{display:flex;align-items:stretch;border:1px solid var(--line);background:var(--panel);overflow-x:auto}
.step{
  flex:1;min-width:118px;padding:12px 12px 13px;border-right:1px solid var(--line-soft);
  position:relative;
}
.step:last-child{border-right:0}
.step__n{font-size:9px;letter-spacing:1px;color:var(--muted-2)}
.step__t{font-size:10px;margin-top:6px;color:var(--muted);line-height:1.35}
.step__bar{height:2px;background:var(--line);margin-top:11px}
.step.done .step__n{color:var(--ok)} .step.done .step__t{color:var(--txt)} .step.done .step__bar{background:var(--ok)}
.step.now{background:var(--gold-dim)}
.step.now .step__n{color:var(--gold)} .step.now .step__t{color:var(--gold)} .step.now .step__bar{background:var(--gold)}
.step.now::after{content:"◉";position:absolute;top:10px;right:11px;color:var(--gold);font-size:9px}

.prj{border:1px solid var(--line);background:var(--panel);margin-bottom:16px}
.prj__hd{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 16px;border-bottom:1px solid var(--line)}
.prj__id{color:var(--gold);font-size:11px;letter-spacing:1px}
.prj__client{font-size:13px;font-weight:700}
.prj__meta{color:var(--muted);font-size:10px;letter-spacing:.5px}
.prj__prog{font-size:11px;color:var(--muted)}
.prj__prog b{color:var(--gold)}

/* ============================== FLYOUT ============================== */
.flyout-mask{position:fixed;inset:0;background:rgba(0,0,0,.62);opacity:0;visibility:hidden;transition:.18s;z-index:40}
.flyout-mask.open{opacity:1;visibility:visible}
.flyout{
  position:fixed;top:0;right:0;height:100vh;width:var(--flyout-w);max-width:92vw;
  background:var(--panel);border-left:1px solid var(--gold-edge);
  transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.1,1);
  z-index:41;display:flex;flex-direction:column;
}
.flyout.open{transform:translateX(0)}
.flyout__hd{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between}
.flyout__hd .eyebrow{margin-bottom:4px}
.flyout__hd h2{font-size:17px;font-weight:700;letter-spacing:.5px}
.flyout__hd .x{background:none;border:1px solid var(--line);color:var(--muted);width:28px;height:28px;font-size:14px;transition:.12s}
.flyout__hd .x:hover{border-color:var(--bad);color:var(--bad)}
.flyout__bd{padding:20px;overflow-y:auto;flex:1}
.kv{display:grid;grid-template-columns:120px 1fr;gap:10px 14px;font-size:12px;margin-bottom:22px}
.kv dt{color:var(--muted-2);font-size:9px;letter-spacing:1.4px;text-transform:uppercase;padding-top:2px}
.kv dd{color:var(--txt)}
.flyout__bd h4{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:0 0 11px;padding-bottom:7px;border-bottom:1px solid var(--line)}
.mini{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:22px}
.mini td{padding:7px 0;border-bottom:1px solid var(--line-soft);color:var(--muted)}
.mini td:last-child{text-align:right;color:var(--txt)}

/* ============================== SLA / BILLING ============================== */
.sla-clause{display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:1px solid var(--line-soft)}
.sla-clause:last-child{border-bottom:0}
.sla-clause__main{flex:1}
.sla-clause__metric{font-size:12px;color:var(--txt);letter-spacing:.5px}
.sla-clause__rule{font-size:10px;color:var(--muted);margin-top:3px}
.sla-clause__pen{font-size:10px;color:var(--gold);margin-top:3px}

.inv{border:1px solid var(--line);background:var(--panel);margin-bottom:16px}
.inv__hd{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
.inv__id{color:var(--gold);font-size:11px;letter-spacing:1px}
.inv__line{display:flex;justify-content:space-between;padding:8px 16px;font-size:12px;border-bottom:1px solid var(--line-soft)}
.inv__line .desc{color:var(--muted)}
.inv__line.adj{background:var(--bad-dim)}
.inv__line.adj .desc{color:var(--bad)}
.inv__line.adj .amt{color:var(--bad)}
.inv__line.adj .ref{color:var(--muted-2);font-size:9px;letter-spacing:.5px;margin-left:8px}
.inv__total{display:flex;justify-content:space-between;padding:12px 16px;font-size:13px;font-weight:700;border-top:1px solid var(--line)}
.inv__total .amt{color:var(--gold)}
.inv__total.struck .was{color:var(--muted-2);text-decoration:line-through;font-weight:400;margin-right:10px;font-size:11px}

/* ---- schema scaffold (Phase 2 modules) ---- */
.scaffold{border:1px solid var(--line);background:var(--panel)}
.scaffold__hd{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.scaffold__hd .tag{font-size:9px;letter-spacing:2px;color:var(--bg);background:var(--gold);padding:3px 8px}
.code{padding:18px;font-size:11.5px;line-height:1.7;overflow-x:auto;color:#cfcfcf;white-space:pre;tab-size:2}
.code .k{color:var(--gold)} .code .s{color:var(--ok)} .code .c{color:var(--muted-2)} .code .n{color:#e0a060}

/* ============================== TOAST ============================== */
.toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:9px;z-index:60}
.toast{
  background:var(--panel-2);border:1px solid var(--gold-edge);border-left-width:3px;
  padding:11px 16px;font-size:11px;letter-spacing:.4px;min-width:300px;max-width:380px;
  animation:slidein .2s ease;
}
.toast.bad{border-color:rgba(224,83,61,.5);border-left-color:var(--bad)}
.toast b{color:var(--gold);letter-spacing:1px;display:block;font-size:9px;text-transform:uppercase;margin-bottom:3px}
.toast.bad b{color:var(--bad)}
@keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

.empty{padding:50px;text-align:center;color:var(--muted-2);font-size:11px;letter-spacing:1px}
@media(max-width:880px){
  body{grid-template-columns:1fr}
  .nav{position:fixed;left:0;top:0;width:var(--nav-w);z-index:50;transform:translateX(-100%)}
  .grid--3,.grid--2{grid-template-columns:1fr}
  .kpis{display:none}
}
</style>
</head>

<script>
"use strict";
/* ============================================================ ▼ NexusBus / core/bus.js =====
   Pub/sub nervous system. Modules NEVER reference each other — they talk through here.
   This is the single mechanism that makes the SLA→Billing reactive contract possible. */
const NexusBus = (() => {
  const ch = new Map();
  return {
    on(evt, fn){
      if(!ch.has(evt)) ch.set(evt, new Set());
      ch.get(evt).add(fn);
      return () => ch.get(evt) && ch.get(evt).delete(fn); // returns unsubscribe
    },
    emit(evt, payload){
      if(ch.has(evt)) ch.get(evt).forEach(fn => fn(payload));
      if(ch.has("*")) ch.get("*").forEach(fn => fn({evt, payload}));
    }
  };
})();

/* ============================================================ ▼ NexusStore / core/store.js =====
   Single source of truth. Every mutation broadcasts on the bus.
   Collections map 1:1 to the 9 enterprise verticals' JSON contracts. */
const NexusStore = (() => {
  const ISO_STEPS = [
    "Pre-Audit Planning","Opening Meeting","On-Site Audit","Findings Documentation",
    "Closing Meeting","Corrective Action","Re-Audit & Certification","Post-Cert Surveillance"
  ];
  const fmtBDT = n => "৳" + Math.round(n).toLocaleString("en-IN");

  /* ---------- seed (core/seed.js) — grounded in the live ISO 27001 audit business ---------- */
  const state = {
    clients: [
      {id:"CLT-0042",legal_name:"Meridian Bank Ltd",sector:"Banking",region:"Dhaka",status:"ACTIVE",ltv:4200000,contact:"CISO · S. Rahman",since:"2024-11",contracts:["CTR-2026-0042"]},
      {id:"CLT-0039",legal_name:"GovNet Data Authority",sector:"Government",region:"Dhaka",status:"ACTIVE",ltv:6500000,contact:"Dir. IT · M. Karim",since:"2025-02",contracts:["CTR-2026-0039"]},
      {id:"CLT-0051",legal_name:"Apex RMG Exports",sector:"RMG Export",region:"Gazipur",status:"ACTIVE",ltv:1800000,contact:"COO · F. Akter",since:"2025-06",contracts:["CTR-2026-0051"]},
      {id:"CLT-0055",legal_name:"Sonar Digital Fintech",sector:"Fintech",region:"Dhaka",status:"LEAD",ltv:0,contact:"CTO · T. Hossain",since:"—",contracts:[]},
      {id:"CLT-0061",legal_name:"Horizon Microfinance",sector:"Fintech",region:"Chattogram",status:"ACTIVE",ltv:2100000,contact:"Head Risk · N. Islam",since:"2025-09",contracts:[]},
      {id:"CLT-0033",legal_name:"Delta Knitwear Group",sector:"RMG Export",region:"Narayanganj",status:"DORMANT",ltv:950000,contact:"MD · A. Chowdhury",since:"2024-03",contracts:[]}
    ],
    contracts: [
      {id:"CTR-2026-0042",client_id:"CLT-0042",service:"Full Audit & Certification",value:1200000,start:"2026-03-01",end:"2026-09-01",status:"ACTIVE",sla_id:"SLA-0042"},
      {id:"CTR-2026-0039",client_id:"CLT-0039",service:"Digital Transformation Audit",value:1800000,start:"2026-02-10",end:"2026-08-10",status:"ACTIVE",sla_id:"SLA-0039"},
      {id:"CTR-2026-0051",client_id:"CLT-0051",service:"Surveillance Audit",value:400000,start:"2026-05-15",end:"2027-05-15",status:"ACTIVE",sla_id:"SLA-0051"}
    ],
    slas: [
      {id:"SLA-0042",contract_id:"CTR-2026-0042",clauses:[
        {clause_id:"CLS-RESP-24H",metric:"RESPONSE_TIME",unit:"hours",threshold:24,penalty:{model:"PERCENT_DISCOUNT",value:10,basis:"INVOICE_SUBTOTAL",applies_to:"NEXT_INVOICE",cap_pct:25}},
        {clause_id:"CLS-RPT-DUE",metric:"REPORT_DELIVERY",unit:"days",threshold:0,penalty:{model:"FLAT_CREDIT",value:50000,basis:"FIXED",applies_to:"NEXT_INVOICE"}}
      ]},
      {id:"SLA-0039",contract_id:"CTR-2026-0039",clauses:[
        {clause_id:"CLS-RESP-24H",metric:"RESPONSE_TIME",unit:"hours",threshold:24,penalty:{model:"PERCENT_DISCOUNT",value:8,basis:"INVOICE_SUBTOTAL",applies_to:"NEXT_INVOICE",cap_pct:20}}
      ]},
      {id:"SLA-0051",contract_id:"CTR-2026-0051",clauses:[
        {clause_id:"CLS-RESP-48H",metric:"RESPONSE_TIME",unit:"hours",threshold:48,penalty:{model:"PERCENT_DISCOUNT",value:5,basis:"INVOICE_SUBTOTAL",applies_to:"NEXT_INVOICE",cap_pct:15}}
      ]}
    ],
    invoices: [
      {id:"INV-2026-0042-03",contract_id:"CTR-2026-0042",client_id:"CLT-0042",currency:"BDT",issue:"2026-06-01",due:"2026-06-30",status:"DRAFT",
        line_items:[{ref:"MS-03",description:"On-Site Audit — milestone 3/5",amount:800000}]},
      {id:"INV-2026-0039-02",contract_id:"CTR-2026-0039",client_id:"CLT-0039",currency:"BDT",issue:"2026-05-20",due:"2026-06-19",status:"ISSUED",
        line_items:[{ref:"MS-02",description:"Cloud/API security assessment",amount:600000}]},
      {id:"INV-2026-0051-02",contract_id:"CTR-2026-0051",client_id:"CLT-0051",currency:"BDT",issue:"2026-06-05",due:"2026-07-05",status:"DRAFT",
        line_items:[{ref:"SV-H1",description:"Surveillance audit — H1",amount:200000}]}
    ],
    projects: [
      {id:"PRJ-0042",client_id:"CLT-0042",contract_id:"CTR-2026-0042",current_step:3,findings:12,resolved:10,start:"2026-03-01"},
      {id:"PRJ-0039",client_id:"CLT-0039",contract_id:"CTR-2026-0039",current_step:5,findings:7,resolved:6,start:"2026-02-10"},
      {id:"PRJ-0051",client_id:"CLT-0051",contract_id:"CTR-2026-0051",current_step:8,findings:2,resolved:2,start:"2026-05-15"}
    ],
    breaches: [],     // append-only breach log
    adjustments: []   // pending billing adjustments derived from breaches
  };

  return {
    ISO_STEPS, fmtBDT,
    all: c => state[c],
    find: (c,id,k="id") => state[c].find(x => x[k] === id),
    where: (c,fn) => state[c].filter(fn),
    push(c,rec){ state[c].push(rec); NexusBus.emit("store:"+c, state[c]); return rec; },
    update(c,id,patch,k="id"){ const r = this.find(c,id,k); if(r) Object.assign(r,patch); NexusBus.emit("store:"+c, state[c]); return r; },
    pendingFor: cid => state.adjustments.filter(a => a.contract_id === cid && a.status === "PENDING")
  };
})();

   Atomic modularity: every vertical is a standalone object that injects its own HTML
   into the router's container and owns its own mount/unmount lifecycle. */
class NexusModule {
  constructor({id,label,icon,group,pip}){ Object.assign(this,{id,label,icon,group,pip:pip||""}); this._cleanup=[]; }
  render(c){ c.innerHTML = this.template(); this.afterRender(c); }
  template(){ return `<div class="empty">MODULE NOT IMPLEMENTED</div>`; }
  afterRender(){}
  mount(){}                                   // subscribe to bus here
  unmount(){ this._cleanup.forEach(fn=>fn()); this._cleanup=[]; } // auto-runs unsubscribes
  sub(evt,fn){ this._cleanup.push(NexusBus.on(evt,fn)); } // tracked subscription
}

/* ---------------------------------------------------------- modules/sla.js ----
   The PRODUCER side of the reactive contract. Emits sla:breach onto the bus.
   In production this fires from a Make.com/Apps Script webhook POST — the demo
   "Log Breach" button constructs the identical payload locally. */
class SLAModule extends NexusModule {
  template(){
    const blocks = NexusStore.all("slas").map(sla=>{
      const ctr = NexusStore.find("contracts",sla.contract_id);
      const client = NexusStore.find("clients",ctr.client_id);
      const clauses = sla.clauses.map(cl=>{
        const pen = cl.penalty.model==="PERCENT_DISCOUNT"
          ? `${cl.penalty.value}% discount on next invoice (cap ${cl.penalty.cap_pct}%)`
          : `${NexusStore.fmtBDT(cl.penalty.value)} flat credit`;
        return `<div class="sla-clause">
          <div class="sla-clause__main">
            <div class="sla-clause__metric">${cl.metric.replace(/_/g," ")}</div>
            <div class="sla-clause__rule">threshold: ≤ ${cl.threshold} ${cl.unit} · clause ${cl.clause_id}</div>
            <div class="sla-clause__pen">⛒ breach penalty → ${pen}</div>
          </div>
          <button class="btn btn--bad btn--xs" data-sla="${sla.id}" data-clause="${cl.clause_id}">⚠ Log Breach</button>
        </div>`;
      }).join("");
      return `<div class="panel" style="margin-bottom:16px">
        <div class="panel__hd"><h3>${sla.id} <i>·</i> ${esc(client.legal_name)}</h3><span class="pill pill--mute">${ctr.id}</span></div>
        ${clauses}</div>`;
    }).join("");
    return `
      <span class="eyebrow">Vertical 07 — Terms & Service Levels</span>
      <div class="mod-head"><div><h1>T&amp;C <i>//</i> SLA Governance</h1>
        <p>Service-level clauses bound to each contract. A logged breach emits <code style="color:var(--gold)">sla:breach</code> on the event bus — Billing consumes it and applies the penalty automatically. No direct call between modules.</p></div></div>
      ${blocks}
      <div class="panel" id="breach-log"><div class="panel__hd"><h3>Breach <i>Log</i></h3><span style="color:var(--muted-2);font-size:10px" id="breach-count">0 events</span></div>
      <div id="breach-body"><div class="empty">No breaches recorded this session.</div></div></div>`;
  }
  afterRender(c){
    c.querySelectorAll("[data-sla]").forEach(b=>b.addEventListener("click",()=>this.logBreach(b.dataset.sla,b.dataset.clause)));
    this.renderLog();
  }
  /* compute penalty against the contract's latest DRAFT invoice subtotal */
  penaltyAmount(contractId, penalty){
    if(penalty.model==="FLAT_CREDIT") return -penalty.value;
    const inv = NexusStore.where("invoices",i=>i.contract_id===contractId && i.status==="DRAFT")
                          .sort((a,b)=>b.issue.localeCompare(a.issue))[0];
    const basis = inv ? inv.line_items.reduce((s,l)=>s+l.amount,0) : 0;
    let amt = basis * (penalty.value/100);
    if(penalty.cap_pct) amt = Math.min(amt, basis*(penalty.cap_pct/100));
    return -Math.round(amt);
  }
  logBreach(slaId, clauseId){
    const sla = NexusStore.find("slas",slaId);
    const clause = sla.clauses.find(c=>c.clause_id===clauseId);
    const ctr = NexusStore.find("contracts",sla.contract_id);
    const observed = clause.metric==="RESPONSE_TIME" ? clause.threshold + 12 + Math.floor(Math.random()*30) : clause.threshold;
    const amount = this.penaltyAmount(ctr.id, clause.penalty);
    const stamp = new Date().toISOString();
    const breach_id = "BRC-"+stamp.slice(2,10).replace(/-/g,"")+"-"+String(NexusStore.all("breaches").length+1).padStart(3,"0");

    /* === canonical breach payload (identical to webhook contract) === */
    const payload = {
      event:"sla.breach", breach_id, sla_id:slaId, clause_id:clauseId,
      contract_id:ctr.id, client_id:ctr.client_id,
      metric:clause.metric, unit:clause.unit, threshold:clause.threshold, observed,
      severity:"MAJOR", detected_at:stamp, source:"apps_script_webhook",
      penalty:{...clause.penalty, status:"PENDING", computed_amount:amount}
    };
    NexusStore.push("breaches", payload);
    NexusStore.push("adjustments", {
      adj_id:"ADJ-"+breach_id, type:"SLA_PENALTY", source_breach_id:breach_id, source_clause_id:clauseId,
      contract_id:ctr.id, label:`SLA breach · ${clause.metric.replace(/_/g," ").toLowerCase()}`,
      model:clause.penalty.model, value:clause.penalty.value, amount, status:"PENDING"
    });
    NexusBus.emit("sla:breach", payload); // ← the reactive handoff
    toast("SLA BREACH · "+ctr.id, `${clause.metric.replace(/_/g," ")} ${observed}${clause.unit==="hours"?"h":""} vs ≤${clause.threshold} → ${NexusStore.fmtBDT(Math.abs(amount))} penalty queued to billing`, true);
    this.renderLog();
  }
  renderLog(){
    const log = NexusStore.all("breaches");
    $("#breach-count").textContent = log.length+" events";
    if(!log.length) return;
    $("#breach-body").innerHTML = `<table class="tbl"><thead><tr>
      <th>Breach ID</th><th>Contract</th><th>Metric</th><th class="r">Observed</th><th class="r">Penalty</th><th>Status</th>
    </tr></thead><tbody>${log.slice().reverse().map(b=>`<tr>
      <td class="id-cell num">${b.breach_id}</td><td class="num">${b.contract_id}</td>
      <td>${b.metric.replace(/_/g," ")}</td><td class="r num">${b.observed}${b.unit==="hours"?"h":""}</td>
      <td class="r num" style="color:var(--bad)">${NexusStore.fmtBDT(b.penalty.computed_amount)}</td>
      <td><span class="pill pill--gold">${b.penalty.status}</span></td></tr>`).join("")}</tbody></table>`;
  }
}

      const total = subtotal + adj.reduce((s,a)=>s+a.amount,0);
      const struck = adj.length ? "struck" : "";

      const stMap={DRAFT:"mute",ISSUED:"gold",PAID:"ok",OVERDUE:"bad"};
      return `<div class="inv">
        <div class="inv__hd"><div><span class="inv__id">${inv.id}</span> · ${esc(client.legal_name)}</div>
          <div style="display:flex;gap:10px;align-items:center"><span style="color:var(--muted-2);font-size:10px">due ${inv.due}</span><span class="pill pill--${stMap[inv.status]}">${inv.status}</span></div></div>
        ${lines}${adjLines}
        <div class="inv__total ${struck}"><span>NET PAYABLE</span><span class="amt num">${was}${NexusStore.fmtBDT(total)}</span></div>

    }).join("");

    this.sub("sla:breach", () => {

    });
  }
}

/* ============================================================ ▼ Router / core/router.js =====
   Hash-based (static-host safe). Owns module registry + mount/unmount lifecycle.
   Swaps the inner HTML of one container — the DOM shell never reloads. */
class NEXUS_App_Router {
  constructor(viewSel, navSel, crumbSel){
    this.view=$(viewSel); this.nav=$(navSel); this.crumb=$(crumbSel);
    this.modules=new Map(); this.active=null; this.fallback=null;
    window.addEventListener("hashchange", ()=>this.resolve());
  }
  register(mod){ this.modules.set(mod.id,mod); return this; }
  start(fallback){ this.fallback=fallback; this.renderNav(); this.resolve(); }
  navigate(id){ location.hash="#/"+id; }
  resolve(){
    const id=(location.hash.replace(/^#\/?/,"")||this.fallback);
    const mod=this.modules.get(id)||this.modules.get(this.fallback);
    if(this.active) this.active.unmount();      // tears down tracked bus subs
    this.view.scrollTop=0; this.view.innerHTML="";
    this.active=mod;
    mod.render(this.view);
    mod.mount();
    this.crumb.textContent=mod.label.split(" ")[0].toUpperCase();
    this.setActiveNav(mod.id);
    NexusBus.emit("route:change", mod.id);
  }
  renderNav(){
    this.nav.innerHTML=[...this.modules.values()].map(m=>`
      <li class="nav__item" data-id="${m.id}">
        <span class="nav__ico">${m.icon}</span><span class="nav__lbl">${m.label.split(" ")[0]}</span>
        <span class="nav__pip">${m.pip}</span>
      </li>`).join("");
    this.nav.querySelectorAll(".nav__item").forEach(li=>li.addEventListener("click",()=>this.navigate(li.dataset.id)));
  }
  setActiveNav(id){ this.nav.querySelectorAll(".nav__item").forEach(li=>li.classList.toggle("is-active",li.dataset.id===id)); }
}
