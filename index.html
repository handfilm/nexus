<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NEXUS Security & Audit - Enterprise Portal">
    <meta name="theme-color" content="#0f172a">
    <title>NEXUS Security & Audit — Enterprise Portal</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: rgba(148, 163, 184, 0.1);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(148, 163, 184, 0.2);
            --active-step: 0;
        }

        body.theme-light {
            --primary: #ffffff;
            --secondary: #f8fafc;
            --accent: #2563eb;
            --accent-light: #3b82f6;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: rgba(15, 23, 42, 0.1);
            --glass-bg: rgba(248, 250, 252, 0.8);
            --glass-border: rgba(15, 23, 42, 0.2);
        }

        body.theme-minimal {
            --primary: #ffffff;
            --secondary: #fafafa;
            --accent: #000000;
            --accent-light: #333333;
            --text-primary: #000000;
            --text-secondary: #666666;
            --border-color: rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #0a0f1b 100%);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        body.theme-light {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
        }

        body.theme-minimal {
            background: #fafafa;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Controls */
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 2000;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .control-group {
            display: flex;
            gap: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 8px;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: transparent;
            border: 2px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Header */
        .portal-header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 0;
            transition: all 0.3s ease;
        }

        .portal-header.scrolled {
            padding: 10px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .portal-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .portal-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-light);
        }

        .portal-client-info {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 14px;
        }

        .client-badge {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent-light);
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .client-badge:hover {
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        /* Main Content */
        .portal-main {
            margin-top: 80px;
            padding: 40px 0;
        }

        /* Sections */
        .section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--accent-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Lifecycle Container */
        .lifecycle-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
        }

        .timeline {
            position: relative;
            padding: 40px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent), transparent);
        }

        .timeline-item {
            margin-bottom: 50px;
            position: relative;
            opacity: 0.6;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .timeline-item[data-state="COMPLIANCE_PASSED"] {
            opacity: 0.8;
        }

        .timeline-item[data-state="ACTIVE"] {
            opacity: 1;
        }

        .timeline-item:nth-child(odd) {
            margin-left: 0;
            margin-right: 50%;
            text-align: right;
        }

        .timeline-item:nth-child(even) {
            margin-left: 50%;
            margin-right: 0;
            text-align: left;
        }

        .timeline-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border: 4px solid var(--primary);
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            transition: all 0.3s ease;
        }

        .timeline-item[data-state="ACTIVE"] .timeline-dot {
            width: 28px;
            height: 28px;
            border-width: 6px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.8); }
            50% { box-shadow: 0 0 30px rgba(59, 130, 246, 1); }
        }

        .timeline-content {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .timeline-item[data-state="ACTIVE"] .timeline-content {
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15);
            background: rgba(59, 130, 246, 0.08);
        }

        .timeline-content h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--accent-light);
        }

        .timeline-content p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .state-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .state-badge.PENDING {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .state-badge.ACTIVE {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent-light);
            animation: blink 1s infinite;
        }

        .state-badge.COMPLIANCE_PASSED {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Terminal */
        .status-terminal-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .status-terminal {
            min-height: 200px;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
            color: var(--accent-light);
        }

        .terminal-title {
            font-weight: 600;
        }

        .encryption-badge {
            color: #4ade80;
            font-size: 11px;
        }

        .terminal-logs {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .terminal-line {
            display: flex;
            gap: 10px;
            margin: 5px 0;
            padding: 3px;
            border-left: 2px solid transparent;
        }

        .terminal-line[data-type="success"] {
            border-left-color: #4ade80;
            color: #4ade80;
        }

        .terminal-line[data-type="error"] {
            border-left-color: #f87171;
            color: #f87171;
        }

        .terminal-line[data-type="info"] {
            border-left-color: var(--accent);
            color: var(--accent-light);
        }

        .terminal-line[data-type="warn"] {
            border-left-color: #fbbf24;
            color: #fbbf24;
        }

        .timestamp {
            color: var(--text-secondary);
            min-width: 100px;
        }

        .severity {
            font-weight: 600;
            min-width: 50px;
        }

        .message {
            flex: 1;
        }

        .terminal-status {
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 11px;
        }

        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .service-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .service-card:hover {
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.1);
            transform: translateY(-4px);
        }

        .service-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .service-card p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .service-pricing {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .price-range {
            color: var(--accent-light);
            font-weight: 600;
            font-size: 14px;
        }

        .duration {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .btn-add-to-estimate {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-add-to-estimate:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Estimate Summary */
        .estimate-summary {
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        body.theme-light .estimate-summary,
        body.theme-minimal .estimate-summary {
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
        }

        .estimate-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .estimate-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .estimate-detail {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .estimate-detail-label {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .estimate-detail-value {
            font-size: 20px;
            font-weight: 700;
        }

        .estimate-actions {
            margin-top: 20px;
            padding: 15px;
            background: rgba(74, 222, 128, 0.1);
            border-left: 4px solid #4ade80;
            border-radius: 4px;
        }

        .estimate-actions button {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid #4ade80;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .estimate-actions button:hover {
            background: rgba(74, 222, 128, 0.3);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--glass-border);
            padding: 40px 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 60px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .timeline::before {
                left: 10px;
            }

            .timeline-item:nth-child(odd),
            .timeline-item:nth-child(even) {
                margin-left: 0;
                margin-right: 0;
                padding-left: 50px;
                text-align: left;
            }

            .timeline-dot {
                left: 0;
            }

            .portal-header-content {
                flex-direction: column;
                gap: 10px;
            }

            .portal-client-info {
                flex-direction: column;
                gap: 10px;
                font-size: 12px;
            }

            .controls {
                top: auto;
                bottom: 20px;
                right: 10px;
            }

            .section-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body class="theme-dark lang-en">

<!-- Controls -->
<div class="controls">
    <div class="control-group">
        <button class="control-btn active" title="Dark Theme" onclick="setTheme('dark')">🌙</button>
        <button class="control-btn" title="Light Theme" onclick="setTheme('light')">☀️</button>
        <button class="control-btn" title="Professional Theme" onclick="setTheme('minimal')">💼</button>
    </div>
    <div class="control-group">
        <button class="control-btn active" title="English" onclick="setLang('en')">EN</button>
        <button class="control-btn" title="Bangla" onclick="setLang('bn')">BN</button>
    </div>
</div>

<!-- Header -->
<header class="portal-header" id="portal-header">
    <div class="container">
        <div class="portal-header-content">
            <div class="portal-logo">⬡ NEXUS</div>
            <div class="portal-client-info">
                <span class="client-badge">Client ID: <span id="client-id">—</span></span>
                <span class="client-badge">Audit Step: <span id="audit-step">0/8</span></span>
                <span class="client-badge">Status: <span id="sync-status">IDLE</span></span>
            </div>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="portal-main">
    <div class="container">

        <!-- Status Terminal -->
        <div class="section">
            <div class="status-terminal-container">
                <div id="status-terminal"></div>
            </div>
        </div>

        <!-- Audit Lifecycle -->
        <div class="section">
            <h2 class="section-title">📊 Audit Lifecycle Tracking</h2>
            <div class="lifecycle-container">
                <div class="timeline" id="lifecycle-timeline"></div>
            </div>
        </div>

        <!-- Service Estimator -->
        <div class="section">
            <h2 class="section-title">💼 Service Estimator</h2>
            <div class="services-grid" id="services-grid"></div>
        </div>

        <!-- Estimate Summary -->
        <div id="estimate-summary-container"></div>

    </div>
</main>

<!-- Footer -->
<footer>
    <div class="container">
        <p>© 2025 NEXUS Security & Audit. ISO 27001 Certified | Enterprise Portal v1.0</p>
    </div>
</footer>

<!-- Core Engines -->
<script src="./NEXUS_Core_Engine.js"></script>
<script src="./AuditLifecycleController.js"></script>
<script src="./ServiceEstimator.js"></script>
<script src="./StatusTerminalUI.js"></script>

<!-- Application Logic -->
<script>
    // Initialize Engines
    const NEXUS_Engine = NEXUS;
    const NEXUS_Lifecycle = new AuditLifecycleController(NEXUS_Engine);
    const NEXUS_Estimator = new ServiceEstimator(NEXUS_Engine);
    const NEXUS_Terminal = new StatusTerminalUI(NEXUS_Engine, '#status-terminal');

    /**
     * Set theme
     */
    function setTheme(theme) {
        document.body.className = document.body.className.replace(/theme-\w+/, `theme-${theme}`);
        NEXUS_Engine.setTheme(theme);
        updateThemeButtons(theme);
    }

    /**
     * Set language
     */
    function setLang(lang) {
        if (lang === 'bn') {
            document.body.classList.add('lang-bn');
        } else {
            document.body.classList.remove('lang-bn');
        }
        NEXUS_Engine.setLanguage(lang);
        updateLangButtons(lang);
    }

    /**
     * Update theme buttons
     */
    function updateThemeButtons(theme) {
        document.querySelectorAll('.control-group:first-child .control-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        const themeIcons = { 'dark': 0, 'light': 1, 'minimal': 2 };
        document.querySelectorAll('.control-group:first-child .control-btn')[themeIcons[theme]].classList.add('active');
    }

    /**
     * Update language buttons
     */
    function updateLangButtons(lang) {
        document.querySelectorAll('.control-group:last-child .control-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        const langIndex = lang === 'en' ? 0 : 1;
        document.querySelectorAll('.control-group:last-child .control-btn')[langIndex].classList.add('active');
    }

    /**
     * Initialize on DOM ready
     */
    window.addEventListener('DOMContentLoaded', () => {
        // Restore persisted state
        NEXUS_Engine.restoreState();
        
        // Initialize UI
        NEXUS_Lifecycle.renderLifecycleUI('#lifecycle-timeline');
        NEXUS_Estimator.renderServiceCards('#services-grid');

        // Apply saved theme and language
        setTheme(NEXUS_Engine.getTheme());
        setLang(NEXUS_Engine.getLanguage());

        // Mock JWT session for demo
        const mockToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJjbGllbnRfaWQiOiJORVhVUy0yMDI2LVg5IiwiYXVkaXRfbWF0cml4IjoicHJvYWN0aXZlIiwic2NvcGUiOiJmdWxsIiwiaWF0IjoxNzA1MDAwMDAwfQ.abc123';
        NEXUS_Engine.establishSecureSession(mockToken);

        // Update header with client info
        document.getElementById('client-id').textContent = NEXUS_Engine.clientMeta.client_id;

        // Subscribe to state changes
        NEXUS_Engine.subscribe('TELEMETRY_COMMITTED', (data) => {
            document.getElementById('audit-step').textContent = `${data.audit_track_step}/8`;
            document.getElementById('sync-status').textContent = 'SYNCED';
            NEXUS_Lifecycle.advanceToStep(data.audit_track_step, { timestamp: Date.now() });
            NEXUS_Lifecycle.renderLifecycleUI('#lifecycle-timeline');
        });

        NEXUS_Engine.subscribe('SERVICE_ADDED_TO_ESTIMATE', () => {
            NEXUS_Estimator.renderEstimateSummary('#estimate-summary-container');
        });

        NEXUS_Engine.subscribe('ESTIMATE_CLEARED', () => {
            document.getElementById('estimate-summary-container').innerHTML = '';
        });
    });

    /**
     * Header scroll effect
     */
    window.addEventListener('scroll', () => {
        const header = document.getElementById('portal-header');
        if (window.scrollY > 50) {
            header.classList.add('scrolled');
        } else {
            header.classList.remove('scrolled');
        }
    });

    /**
     * Simulate telemetry ingestion (demo)
     */
    function ingestSampleTelemetry(step = 3) {
        const payload = {
            client_token: 'NEXUS-2026-X9',
            audit_track_step: step,
            active_compliance_index: 85.8,
            critical_gaps_identified: 0,
            pending_remediations: 4,
            system_encryption_standard: 'AES-256-GCM'
        };
        NEXUS_Engine.ingestTelemetry(payload);
    }

    /**
     * Demo: Advance audit step
     */
    function advanceAuditStep() {
        const currentStep = NEXUS_Engine.stateManager.lifecycle_step;
        if (currentStep < 8) {
            ingestSampleTelemetry(currentStep + 1);
        }
    }
</script>

</body>
</html>
